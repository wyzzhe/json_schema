<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>AI JSON 组件预览工具</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }

        .editor-container {
            width: 50%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            min-height: 0;
        }

        .editor-container > h3 {
            flex-shrink: 0;
            margin: 0 0 12px;
        }

        .api-panel {
            flex-shrink: 0;
            margin-bottom: 12px;
            padding: 12px;
            background: #1e1e1e;
            border: 1px solid #444;
            border-radius: 8px;
        }

        .api-panel-title {
            font-size: 13px;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 10px;
        }

        .api-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .api-row label {
            font-size: 12px;
            color: #aaa;
            flex-shrink: 0;
            min-width: 72px;
        }

        .api-row input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #555;
            border-radius: 4px;
            background: #2d2d2d;
            color: #fff;
            font-size: 13px;
            box-sizing: border-box;
        }

        .api-fetch-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #409eff;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
        }

        .api-fetch-btn:hover {
            background: #66b1ff;
        }

        .api-fetch-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .api-hint {
            font-size: 11px;
            color: #888;
            margin-top: 6px;
            line-height: 1.4;
        }

        .editor-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .editor-tab {
            font-size: 12px;
            color: #aaa;
        }

        .json-editor-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        #jsonInput {
            flex: 1;
            width: 100%;
            min-height: 160px;
            padding: 15px;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.5;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: vertical;
            background: #2d2d2d;
            color: #fff;
            box-sizing: border-box;
        }

        #jsonInput::placeholder {
            color: #777;
        }

        .preview-container {
            width: 50%;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 模拟手机壳 */
        .mobile-mockup {
            width: 375px;
            height: 750px;
            background: white;
            border: 12px solid #333;
            border-radius: 40px;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        /* 组件基础样式 */
        .widget-title {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .block-card {
            background: #fff;
            border: 1px solid #ebeef5;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);
        }

        .block-title-md {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .block-title-lg {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
        }

        /* Item 样式 */
        .item-row {
            margin-bottom: 12px;
        }

        .item-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
            display: block;
        }

        .item-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            background: #f8f9fa;
        }

        .item-textarea {
            min-height: 88px;
            resize: vertical;
            line-height: 1.5;
            font-family: inherit;
        }

        .item-take-photo {
            width: 100%;
            padding: 20px 16px;
            border: 1px dashed #c0c4cc;
            border-radius: 6px;
            background: #f8f9fa;
            box-sizing: border-box;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .item-take-photo:hover {
            border-color: #409eff;
            background: #f0f7ff;
        }

        .take-photo-icon {
            width: 36px;
            height: 36px;
            margin: 0 auto 8px;
            color: #909399;
            display: block;
        }

        .take-photo-text {
            font-size: 14px;
            color: #606266;
        }

        .take-photo-hint {
            font-size: 12px;
            color: #c0c4cc;
            margin-top: 4px;
        }

        /* button：主要 / 次要 / 普通 / 图片 */
        .btn-row {
            margin-bottom: 14px;
            display: flex;
            justify-content: center;
        }

        .btn-row.btn-row-left {
            justify-content: flex-start;
        }

        .item-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            border: 3px solid #000;
            box-shadow: 4px 4px 0 #000;
            box-sizing: border-box;
            transition: transform 0.1s, box-shadow 0.1s;
            width: auto;
            max-width: 100%;
        }

        .item-button:hover {
            opacity: 0.92;
        }

        .item-button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }

        .btn-primary {
            background: #e84b3a;
            color: #fff;
        }

        .btn-secondary {
            background: #f5b5a8;
            color: #000;
        }

        .btn-normal {
            background: #fff;
            color: #000;
        }

        .btn-image {
            background: #fff;
            padding: 0;
            overflow: hidden;
            line-height: 0;
        }

        .btn-icon,
        .btn-icon-placeholder {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            border-radius: 4px;
        }

        .btn-icon {
            object-fit: contain;
        }

        .btn-icon-placeholder {
            display: inline-block;
            background: #000;
        }

        .btn-primary .btn-icon-placeholder {
            background: #fff;
        }

        .btn-image-full {
            display: block;
            width: 100%;
            height: auto;
        }

        .btn-image-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 80px;
            min-height: 48px;
            padding: 8px 16px;
            font-size: 14px;
            color: #666;
        }

        /* block 类型布局 */
        .block-header {
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0 0 16px;
        }

        .block-header-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 32px;
        }

        .block-header-close {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            border: 2px solid #000;
            background: #fff;
            box-shadow: 2px 2px 0 #000;
            cursor: pointer;
            font-size: 16px;
            line-height: 24px;
            text-align: center;
            padding: 0;
        }

        .block-header-close:active {
            transform: translateY(-50%) translate(1px, 1px);
            box-shadow: 1px 1px 0 #000;
        }

        .block-submit {
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 10px 0 0;
        }

        .block-carousel .carousel-track {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 8px;
            scroll-snap-type: x mandatory;
        }

        .block-carousel .carousel-track::-webkit-scrollbar {
            height: 4px;
        }

        .block-carousel .carousel-track::-webkit-scrollbar-thumb {
            background: #dcdfe6;
            border-radius: 2px;
        }

        .block-carousel .carousel-item {
            scroll-snap-align: start;
            flex-shrink: 0;
            min-width: 200px;
            max-width: 260px;
        }

        .block-carousel .carousel-item .item-button {
            white-space: nowrap;
        }

        .block-grid .grid-item .btn-row {
            margin-bottom: 0;
        }

        .block-submit .btn-row {
            margin-bottom: 0;
        }

        .block-grid .grid-track {
            display: grid;
            gap: 10px;
        }

        .block-marquee {
            background: #fdf6ec;
            border: 1px solid #faecd8;
            padding: 8px 12px;
            overflow: hidden;
        }

        .block-marquee .marquee-wrap {
            display: flex;
            align-items: center;
            overflow: hidden;
            white-space: nowrap;
        }

        .block-marquee .marquee-text {
            display: inline-block;
            animation: marquee-scroll 12s linear infinite;
            color: #e6a23c;
            font-size: 13px;
        }

        @keyframes marquee-scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .error-msg {
            color: #f56c6c;
            padding: 10px;
            background: #fef0f0;
            border-radius: 6px;
            font-size: 14px;
        }

        .loading-msg {
            text-align: center;
            color: #909399;
            padding: 40px 20px;
            font-size: 14px;
        }

        /* media_card / icon_card */
        .media-card,
        .icon-card {
            display: flex;
            gap: 12px;
            padding: 12px;
            border: 2px solid #000;
            border-radius: 8px;
            background: #fff;
            box-shadow: 3px 3px 0 #000;
            box-sizing: border-box;
        }

        .media-card {
            align-items: flex-start;
        }

        .icon-card {
            align-items: center;
        }

        .media-card-img,
        .icon-card-icon {
            flex-shrink: 0;
            border: 2px solid #000;
            border-radius: 6px;
            object-fit: cover;
            background: #f5f5f5;
        }

        .media-card-img {
            width: 88px;
            height: 88px;
        }

        .icon-card-icon {
            width: 52px;
            height: 52px;
        }

        .media-card-img-placeholder,
        .icon-card-icon-placeholder {
            display: block;
        }

        .media-card-body,
        .icon-card-body {
            flex: 1;
            min-width: 0;
        }

        .media-card-title,
        .icon-card-label {
            font-size: 15px;
            font-weight: 700;
            color: #222;
            margin-bottom: 4px;
        }

        .icon-card-label {
            font-size: 14px;
            margin-bottom: 0;
        }

        .media-card-lines {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }

        .media-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 6px 0;
        }

        .media-card-tag {
            font-size: 11px;
            padding: 2px 8px;
            background: #fff3e0;
            border: 1px solid #ffb74d;
            border-radius: 4px;
            color: #e65100;
        }

        .media-card-highlight,
        .icon-card-highlight {
            font-size: 13px;
            color: #e84b3a;
            font-weight: 600;
            margin-top: 4px;
        }

        .media-card-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .icon-card-action {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 700;
            background: #f5b5a8;
            color: #000;
            border: 2px solid #000;
            box-shadow: 2px 2px 0 #000;
            cursor: pointer;
            white-space: nowrap;
        }

        .icon-card-action:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #000;
        }

        .icon-card-btn-wrap {
            flex-shrink: 0;
        }

        .media-card-btns .item-button,
        .icon-card-btn-wrap .item-button {
            padding: 6px 12px;
            font-size: 12px;
            border-width: 2px;
            box-shadow: 2px 2px 0 #000;
        }

        .media-card-btns .btn-icon,
        .icon-card-btn-wrap .btn-icon,
        .media-card-btns .btn-icon-placeholder,
        .icon-card-btn-wrap .btn-icon-placeholder {
            width: 14px;
            height: 14px;
        }

        /* plate_input */
        .plate-input-cells {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .plate-input-cell {
            width: 32px;
            height: 40px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            background: #f8f9fa;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            line-height: 40px;
            color: #333;
        }

        .plate-input-cell.wide {
            width: 44px;
        }

        /* radio / checkbox */
        .option-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #333;
        }

        .option-item input {
            flex-shrink: 0;
        }

        .item-desc {
            font-size: 12px;
            color: #909399;
            margin-top: 4px;
        }

        /* switch */
        .item-switch-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .item-switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .item-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .item-switch-slider {
            position: absolute;
            inset: 0;
            background: #dcdfe6;
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .item-switch-slider::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            left: 2px;
            top: 2px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .item-switch input:checked + .item-switch-slider {
            background: #409eff;
        }

        .item-switch input:checked + .item-switch-slider::before {
            transform: translateX(20px);
        }

        /* range pickers */
        .range-input-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .range-input-row .item-input {
            flex: 1;
        }

        .range-sep {
            color: #909399;
            font-size: 13px;
        }

        /* compact_card */
        .compact-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border: 2px solid #000;
            border-radius: 8px;
            background: #fff;
            box-shadow: 2px 2px 0 #000;
            box-sizing: border-box;
        }

        .compact-card-img {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            border: 2px solid #000;
            object-fit: cover;
            flex-shrink: 0;
            background: #f5f5f5;
        }

        .compact-card-img-placeholder {
            display: block;
        }

        .compact-card-title {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
            color: #222;
            min-width: 0;
        }

        /* cover_card */
        .cover-card {
            border: 2px solid #000;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            box-shadow: 3px 3px 0 #000;
            box-sizing: border-box;
        }

        .cover-card-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
            background: #f5f5f5;
        }

        .cover-card-img-placeholder {
            height: 120px;
            background: #eee;
        }

        .cover-card-body {
            padding: 10px 12px;
        }

        .cover-card-title {
            font-size: 15px;
            font-weight: 700;
            color: #222;
            margin-bottom: 4px;
        }

        .cover-card-highlight {
            font-size: 13px;
            color: #e84b3a;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .cover-card-desc {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .cover-card-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* info */
        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #909399;
            flex-shrink: 0;
        }

        .info-value {
            color: #333;
            text-align: right;
            flex: 1;
        }

        /* rich_text */
        .rich-text-body {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }

        .rich-text-body a {
            color: #409eff;
        }

        .rich-text-body strong {
            font-weight: 700;
        }

        /* image gallery */
        .image-gallery {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .image-gallery img {
            width: 120px;
            height: 90px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #dcdfe6;
            flex-shrink: 0;
        }

        .tag-only-row .media-card-tags {
            margin: 0;
        }
    </style>
</head>

<body>

    <div class="editor-container">
        <h3 style="margin-top: 0;">AI JSON 预览</h3>
        <div class="api-panel">
            <div class="api-panel-title">从 Question 接口拉取 Widget</div>
            <div class="api-row">
                <label for="popupApiUrl">Popup URL</label>
                <input type="text" id="popupApiUrl" value="http://127.0.0.1:8000/aibee_claw/api/popup">
            </div>
            <div class="api-row">
                <label for="questionApiUrl">Question URL</label>
                <input type="text" id="questionApiUrl" value="http://127.0.0.1:8000/aibee_claw/api/question">
            </div>
            <div class="api-row">
                <label for="questionPlaceId">place_id</label>
                <input type="text" id="questionPlaceId" value="801">
            </div>
            <div class="api-row">
                <label for="questionToken">token</label>
                <input type="text" id="questionToken" placeholder="必填，请求头 token">
            </div>
            <div class="api-row">
                <label for="questionConvId">conversation_id</label>
                <input type="text" id="questionConvId" value="493354710498488320" placeholder="可选">
            </div>
            <div class="api-row">
                <label for="questionClientType">X-Client-Type</label>
                <input type="text" id="questionClientType" value="wx_mini">
            </div>
            <div class="api-row">
                <label for="questionInput">user_input</label>
                <input type="text" id="questionInput" value="widget=list_card" placeholder="widget=list_card">
            </div>
            <button type="button" class="api-fetch-btn" id="questionFetchBtn">请求并预览</button>
            <div class="api-hint">Question 需 Header：<code style="color:#ccc;">token</code>（必填）、<code style="color:#ccc;">X-Client-Type</code>；Body：<code style="color:#ccc;">user_input</code> + <code style="color:#ccc;">place_id</code>。422 表示校验失败，请看响应 msg。</div>
        </div>
        <div class="editor-tabs">
            <span class="editor-tab">JSON 编辑区（左下角，可修改后实时预览）</span>
        </div>
        <div class="json-editor-section">
            <textarea id="jsonInput" spellcheck="false" placeholder="点击「请求并预览」后，接口返回的 JSON 会显示在这里，可直接编辑。"></textarea>
        </div>
    </div>

    <div class="preview-container">
        <div class="mobile-mockup" id="app">
        </div>
    </div>

    <script>
        const input = document.getElementById('jsonInput');
        const app = document.getElementById('app');

        const BUTTON_STYLES = {
            primary: 'primary',
            secondary: 'secondary',
            normal: 'normal',
            image: 'image'
        };

        const POPUP_API = {
            place_id: '841',
            user_id: '493354710498488320'
        };

        const FETCH_TIMEOUT_MS = 15000;
        const SSE_READ_TIMEOUT_MS = 30000;

        const LOCAL_POPUP_FILES = {
            complaint_feedback: 'complaint_feedback.json'
        };

        const questionApiUrl = document.getElementById('questionApiUrl');
        const popupApiUrl = document.getElementById('popupApiUrl');
        const questionPlaceId = document.getElementById('questionPlaceId');
        const questionToken = document.getElementById('questionToken');
        const questionConvId = document.getElementById('questionConvId');
        const questionClientType = document.getElementById('questionClientType');
        const questionInput = document.getElementById('questionInput');
        const questionFetchBtn = document.getElementById('questionFetchBtn');

        let previewContext = {};
        let renderDebounceTimer = null;

        function setJsonEditorContent(raw, options = {}) {
            const text = typeof raw === 'string' ? raw : JSON.stringify(raw, null, 2);
            input.value = text;
            if (options.focus) {
                input.focus();
                input.setSelectionRange(0, 0);
                input.scrollTop = 0;
            }
            if (options.renderPreview !== false) {
                renderFromEditor(false);
            }
        }

        function renderFromEditor(showEmptyHint) {
            const text = input.value.trim();
            if (!text) {
                if (showEmptyHint !== false) {
                    app.innerHTML = `<div class="loading-msg" style="color:#999;">左下角粘贴 JSON 或点击「请求并预览」</div>`;
                }
                return;
            }
            try {
                const data = JSON.parse(text);
                renderPreviewData(data);
            } catch (e) {
                app.innerHTML = `<div class="error-msg">JSON 格式错误，无法解析！<br><br>${escapeHtml(e.message)}</div>`;
            }
        }

        function getPopupApiBase() {
            const base = (popupApiUrl && popupApiUrl.value || '').trim();
            return base || 'http://127.0.0.1:8000/aibee_claw/api/popup';
        }

        async function fetchWithTimeout(url, options = {}, timeoutMs = FETCH_TIMEOUT_MS) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            try {
                return await fetch(url, { ...options, signal: controller.signal });
            } catch (e) {
                if (e.name === 'AbortError') {
                    throw new Error(`请求超时（${timeoutMs / 1000}s），请检查服务是否启动、地址是否正确`);
                }
                throw e;
            } finally {
                clearTimeout(timer);
            }
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function getButtonProps(item) {
            return item.props || {};
        }

        function getItemProp(item, key) {
            const props = getButtonProps(item);
            if (item[key] !== undefined && item[key] !== null && item[key] !== '') return item[key];
            return props[key];
        }

        function normalizeButtonItem(btn, fallbackLabel) {
            if (!btn || typeof btn !== 'object') {
                return { item: 'button', label: fallbackLabel || '按钮', props: { style: 'secondary' } };
            }
            if (btn.item === 'button') return btn;
            return { item: 'button', label: btn.label || fallbackLabel || '按钮', ...btn };
        }

        function normalizeButtonPayload(btn, fallbackLabel, defaultStyle = 'secondary') {
            if (!btn || typeof btn !== 'object') {
                return { label: fallbackLabel || '按钮', style: defaultStyle };
            }
            const payload = { ...btn };
            const nestedProps = btn.props;
            if (nestedProps && typeof nestedProps === 'object') {
                if (payload.style === undefined && nestedProps.style) payload.style = nestedProps.style;
                if (payload.width === undefined && nestedProps.width !== undefined) payload.width = nestedProps.width;
                if (!payload.icon && nestedProps.icon) payload.icon = nestedProps.icon;
                if (!payload.image && nestedProps.image) payload.image = nestedProps.image;
            }
            delete payload.item;
            delete payload.props;
            if (!payload.label) payload.label = fallbackLabel || '按钮';
            if (!payload.style) payload.style = defaultStyle;
            return payload;
        }

        function getButtonStyle(item, blockType) {
            const props = getButtonProps(item);
            const styleKey = item.style || props.style;
            if (styleKey && BUTTON_STYLES[styleKey]) return BUTTON_STYLES[styleKey];
            if (blockType === 'submit') return 'primary';
            return 'normal';
        }

        function getButtonWidthStyle(item, blockType) {
            const props = getButtonProps(item);
            const width = item.width !== undefined && item.width !== null && item.width !== ''
                ? item.width
                : props.width;
            if (width === undefined || width === null || width === '') {
                if (blockType === 'grid' || blockType === 'submit') return 'width:100%;';
                return '';
            }
            if (typeof width === 'number') return `width:${width}px;`;
            const str = String(width).trim();
            if (/^\d+(\.\d+)?$/.test(str)) return `width:${str}px;`;
            return `width:${str};`;
        }

        function getButtonIcon(item) {
            const props = getButtonProps(item);
            return item.icon || props.icon || '';
        }

        function getButtonImage(item) {
            const props = getButtonProps(item);
            return item.image || props.image || '';
        }

        function getButtonAttrs(item, isSubmit) {
            const attrs = [];
            const action = item.action;
            const actionType = action && action.type;
            if (isSubmit && actionType !== 'open_popup' && actionType !== 'jump') attrs.push('data-action="close"');
            if (actionType) {
                attrs.push(`data-action-type="${escapeHtml(actionType)}"`);
                if (action.popup_id) attrs.push(`data-popup-id="${escapeHtml(action.popup_id)}"`);
                if (action.msg) attrs.push(`data-action-msg="${escapeHtml(action.msg)}"`);
                if (action.url) attrs.push(`data-action-url="${escapeHtml(action.url)}"`);
                if (action.tel) attrs.push(`data-action-tel="${escapeHtml(action.tel)}"`);
                if (action.text_template) attrs.push(`data-action-template="${escapeHtml(action.text_template)}"`);
                if (action.scope && Array.isArray(action.scope)) {
                    attrs.push(`data-action-scope="${escapeHtml(action.scope.join(','))}"`);
                }
                if (action.payload) {
                    try {
                        attrs.push(`data-action-payload="${escapeHtml(JSON.stringify(action.payload))}"`);
                    } catch (e) { /* ignore */ }
                }
                if (actionType === 'nav' && action) {
                    try {
                        attrs.push(`data-action-nav="${escapeHtml(JSON.stringify(action))}"`);

                }

            return attrs.length ? ' ' + attrs.join(' ') : '';

        function getItemFieldProp(item, key, fallback = '') {
            if (item[key] !== undefined && item[key] !== null && item[key] !== '') {
                return item[key];
            }

                return props[key];

                `<path d="M4 7h3l2-2h6l2 2h3a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2z"/>` +
                `<circle cx="12" cy="13" r="3.5"/>` +

        function getBlockWrapper(blockType) {
            if (blockType === 'carousel') return 'carousel-item';

        function normalizeOptions(options) {
            if (!Array.isArray(options)) return [];
            return options.map((opt, i) => {

                if (opt && typeof opt === 'object') {
                    return {

        function renderPlateInput(item) {

        function parseTimeHHMM(str) {
            if (!str) return null;
            const m = String(str).trim().match(/^(\d{1,2}):(\d{2})/);
            if (!m) return null;
            return { h: parseInt(m[1], 10), m: parseInt(m[2], 10) };
        }

        function parseBusinessHoursFromDesc(desc) {
            if (!desc) return null;
            const m = String(desc).match(/(\d{1,2}:\d{2})\s*[-~–至]\s*(\d{1,2}:\d{2})/);
            if (!m) return null;
            const pad = t => {
                const p = parseTimeHHMM(t);
                if (!p) return t;
                return `${String(p.h).padStart(2, '0')}:${String(p.m).padStart(2, '0')}`;
            };
            return { minTime: pad(m[1]), maxTime: pad(m[2]) };
        }

        function extractDatePart(value) {
            if (!value) return '';
            const str = String(value).trim();
            const m = str.match(/^(\d{4}-\d{2}-\d{2})/);
            return m ? m[1] : '';
        }

        function extractTimePart(value) {
            if (!value) return '';
            const str = String(value).trim();
            const m = str.match(/T(\d{2}:\d{2})/);
            return m ? m[1] : '';
        }

        function toDatetimeLocal(dateStr, timeStr) {
            const date = extractDatePart(dateStr);
            if (!date) return '';
            const t = timeStr ? String(timeStr).trim().slice(0, 5) : '00:00';
            if (!/^\d{2}:\d{2}$/.test(t)) return '';
            return `${date}T${t}`;
        }

        function buildDateTimePickerBounds(item) {
            const desc = getItemFieldProp(item, 'desc', '');
            const fromDesc = parseBusinessHoursFromDesc(desc);

            let minRaw = getItemFieldProp(item, 'min', '');
            let maxRaw = getItemFieldProp(item, 'max', '');
            let minDate = getItemFieldProp(item, 'min_date', '') || extractDatePart(minRaw);
            let maxDate = getItemFieldProp(item, 'max_date', '') || extractDatePart(maxRaw);

            let minTime = getItemFieldProp(item, 'min_time', '') || getItemFieldProp(item, 'start_time', '');
            let maxTime = getItemFieldProp(item, 'max_time', '') || getItemFieldProp(item, 'end_time', '');
            if (!minTime) minTime = extractTimePart(minRaw);
            if (!maxTime) maxTime = extractTimePart(maxRaw);
            if (!minTime && fromDesc) minTime = fromDesc.minTime;
            if (!maxTime && fromDesc) maxTime = fromDesc.maxTime;

            const minAttr = minDate ? toDatetimeLocal(minDate, minTime || '00:00') : '';
            const maxAttr = maxDate ? toDatetimeLocal(maxDate, maxTime || '23:59') : '';

            let def = getItemFieldProp(item, 'default', '');
            if (def && !def.includes('T') && minDate) {
                def = toDatetimeLocal(minDate, def);
            }

            return { minDate, maxDate, minTime, maxTime, minAttr, maxAttr, def };
        }

        function clampDateTimeLocalValue(value, bounds) {
            if (!value) return value;
            const parts = value.split('T');
            if (parts.length < 2) return value;
            const datePart = parts[0];
            const { minDate, maxDate, minTime, maxTime } = bounds;

            if (minDate && datePart < minDate) return toDatetimeLocal(minDate, minTime || '00:00');
            if (maxDate && datePart > maxDate) return toDatetimeLocal(maxDate, maxTime || '23:59');

            if (!minTime || !maxTime) return value;

            const t = parseTimeHHMM(parts[1]);
            const lo = parseTimeHHMM(minTime);
            const hi = parseTimeHHMM(maxTime);
            if (!t || !lo || !hi) return value;

            const cur = t.h * 60 + t.m;
            const loMin = lo.h * 60 + lo.m;
            const hiMin = hi.h * 60 + hi.m;
            let clamped = cur;
            if (cur < loMin) clamped = loMin;
            if (cur > hiMin) clamped = hiMin;

            if (clamped === cur) return value;
            const h = String(Math.floor(clamped / 60)).padStart(2, '0');
            const m = String(clamped % 60).padStart(2, '0');
            return `${datePart}T${h}:${m}`;
        }

        function renderDateTimeInput(type, item) {
            const placeholder = escapeHtml(getItemFieldProp(item, 'desc', ''));

            if (type === 'datetime-local') {
                const bounds = buildDateTimePickerBounds(item);
                let attrs = `class="item-input item-datetime-local"`;
                if (bounds.def) attrs += ` value="${escapeHtml(bounds.def)}"`;
                if (bounds.minAttr) attrs += ` min="${escapeHtml(bounds.minAttr)}"`;
                if (bounds.maxAttr) attrs += ` max="${escapeHtml(bounds.maxAttr)}"`;
                if (bounds.minDate) attrs += ` data-dt-min-date="${escapeHtml(bounds.minDate)}"`;
                if (bounds.maxDate) attrs += ` data-dt-max-date="${escapeHtml(bounds.maxDate)}"`;
                if (bounds.minTime) attrs += ` data-dt-min-time="${escapeHtml(bounds.minTime)}"`;
                if (bounds.maxTime) attrs += ` data-dt-max-time="${escapeHtml(bounds.maxTime)}"`;
                let html = `<input type="datetime-local" ${attrs}>`;
                html += renderItemDesc(item);
                return html;

            const def = escapeHtml(getItemFieldProp(item, 'default', ''));

            const button = item.button || props.button;
            const cardAction = item.action;
            let wrapperActionAttrs = '';
            if (button && cardAction) {

                : `<div class="icon-card-icon icon-card-icon-placeholder"></div>`;
            html += `<div class="icon-card-body">`;
            if (label) html += `<div class="icon-card-label">${escapeHtml(label)}</div>`;
            if (highlight && button) {
                html += `<div class="icon-card-highlight">${escapeHtml(highlight)}</div>`;
            }
            html += `</div>`;
            if (button) {
                html += `<div class="icon-card-btn-wrap">${renderButton(normalizeButtonPayload(button, '抢'), null, false)}</div>`;
            } else if (highlight) {
                const legacyAction = cardAction || props.action;
                const legacyActionAttrs = legacyAction ? getButtonAttrs({ action: legacyAction }, false) : '';
                html += `<div class="icon-card-action"${legacyActionAttrs}>${escapeHtml(highlight)}</div>`;
            }
            html += `</div>`;
            return html;
        }

        function renderFormItem(item) {
            if (item.item === 'button') return renderButtonRow(item, null);
            if (item.item === 'media_card') return renderMediaCard(item);
            if (item.item === 'icon_card') return renderIconCard(item);
            if (item.item === 'compact_card') return renderCompactCard(item);
            if (item.item === 'cover_card') return renderCoverCard(item);
            if (item.item === 'info') return renderInfo(item);
            if (item.item === 'rich_text') return renderRichText(item);
            if (item.item === 'tag') return renderTagItem(item);
            if (item.item === 'image') return renderImageGallery(item);

            if (item.item === 'switch') {
                return `<div class="item-row">${renderSwitch(item)}</div>`;
            }

            let html = `<div class="item-row">`;
            if (item.label) {
                html += `<span class="item-label">${escapeHtml(item.label)} ${item.required ? '*' : ''}</span>`;
            }

            switch (item.item) {
                case 'plate_input':
                    html += renderPlateInput(item);
                    break;
                case 'input': {
                    const def = escapeHtml(getItemFieldProp(item, 'default', ''));
                    const placeholder = escapeHtml(getItemFieldProp(item, 'desc', ''));
                    const maxLength = getItemFieldProp(item, 'max_length', '');
                    const maxAttr = maxLength ? ` maxlength="${parseInt(maxLength, 10)}"` : '';
                    html += `<input type="text" class="item-input" value="${def}" placeholder="${placeholder}"${maxAttr}>`;
                    html += renderItemDesc(item);
                    break;
                }
                case 'datetime_picker':
                    html += renderDateTimeInput('datetime-local', item);
                    break;
                case 'date_picker':
                    html += renderDateTimeInput('date', item);
                    break;
                case 'time_picker':
                    html += renderDateTimeInput('time', item);
                    break;
                case 'date_range_picker':
                    html += renderRangePicker('date', item);
                    break;
                case 'time_range_picker':
                    html += renderRangePicker('time', item);
                    break;
                case 'textarea': {
                    const placeholder = escapeHtml(getItemFieldProp(item, 'desc', '请输入'));
                    const rows = parseInt(getItemFieldProp(item, 'rows', 4), 10) || 4;
                    const def = escapeHtml(getItemFieldProp(item, 'default', ''));
                    const maxLength = getItemFieldProp(item, 'max_length', '');
                    const maxAttr = maxLength ? ` maxlength="${parseInt(maxLength, 10)}"` : '';
                    html += `<textarea class="item-input item-textarea" rows="${rows}" placeholder="${placeholder}"${maxAttr}>${def}</textarea>`;
                    html += renderItemDesc(item);
                    break;
                }
                case 'radio_group':
                    html += renderOptionsGroup(item, 'radio');
                    break;
                case 'checkbox_group':
                    html += renderOptionsGroup(item, 'checkbox');
                    break;
                case 'take_photo':
                    html += renderTakePhoto(item);
                    break;
                case 'phone_input':
                    html += renderPhoneInput(item);
                    break;
                default:
                    html += `<div class="item-input" style="background:#eee;">[未知组件: ${escapeHtml(item.item)}]</div>`;
            }
            html += `</div>`;
            return html;
        }

        function renderItems(items, blockType) {
            if (!items || !Array.isArray(items)) return '';
            return items.map(item => {
                if (item.item === 'button') return renderButtonRow(item, blockType);
                const inner = renderFormItem(item);
                if (blockType === 'carousel') {
                    return `<div class="carousel-item">${inner}</div>`;
                }
                return inner;
            }).join('');
        }

        function getGridColumns(count) {
            if (count <= 1) return 1;
            if (count === 2) return 2;
            if (count === 3) return 3;
            if (count === 4) return 2;
            if (count <= 6) return 3;
            if (count <= 8) return 4;
            return 4;
        }

        function renderBlockTitle(title, size) {
            if (!title) return '';
            const cls = size === 'lg' ? 'block-title-lg' : 'block-title-md';
            return `<div class="${cls}">${escapeHtml(title)}</div>`;
        }

        function renderHeaderBlock(block) {
            let html = `<div class="block-card block-header"><div class="block-header-inner">`;
            if (block.title) html += renderBlockTitle(block.title, 'lg');
            html += `<button type="button" class="block-header-close" data-action="close" aria-label="close">×</button>`;
            html += `</div></div>`;
            return html;
        }

        function renderBlock(block) {
            const blockType = block.block || 'list';
            let html = '';

            switch (blockType) {
                case 'header':
                    html += renderHeaderBlock(block);
                    break;

                case 'carousel':
                    html += `<div class="block-card block-carousel">`;
                    html += renderBlockTitle(block.title, 'md');
                    html += `<div class="carousel-track">${renderItems(block.items, 'carousel')}</div>`;
                    html += `</div>`;
                    break;

                case 'grid': {
                    const items = block.items || [];
                    const cols = getGridColumns(items.length);
                    html += `<div class="block-card block-grid">`;
                    html += renderBlockTitle(block.title, 'md');
                    html += `<div class="grid-track" style="grid-template-columns:repeat(${cols},1fr)">${renderItems(items, 'grid')}</div>`;
                    html += `</div>`;
                    break;
                }

                case 'submit':
                    html += `<div class="block-card block-submit">`;
                    html += renderItems(block.items, 'submit');
                    html += `</div>`;
                    break;

                case 'list':
                default:
                    html += `<div class="block-card block-list">`;
                    html += renderBlockTitle(block.title, 'md');
                    html += renderItems(block.items, 'list');
                    html += `</div>`;
                    break;
            }

            return html;
        }

        function normalizeWidgetData(raw) {
            if (!raw || typeof raw !== 'object') return raw;
            if (Array.isArray(raw.blocks)) return raw;
            if (raw.data && Array.isArray(raw.data.blocks)) {
                return {
                    widget: raw.widget || raw.data.widget,
                    widget_id: raw.widget_id || raw.data.widget_id,
                    blocks: raw.data.blocks,
                    place_id: raw.place_id || raw.data.place_id,
                    user_id: raw.user_id || raw.data.user_id
                };
            }
            if (raw.data && typeof raw.data === 'object') return raw.data;
            if (raw.result && Array.isArray(raw.result.blocks)) {
                return {
                    widget: raw.widget,
                    widget_id: raw.widget_id,
                    blocks: raw.result.blocks,
                    place_id: raw.place_id,
                    user_id: raw.user_id
                };
            }
            return raw;
        }

        function normalizePopupData(raw) {
            return normalizeWidgetData(raw);
        }

        function extractJsonFromPayload(text) {
            if (!text) return null;
            const trimmed = String(text).trim();
            const fenceMatch = trimmed.match(/```(?:json)?\s*([\s\S]*?)```/);
            const jsonStr = fenceMatch ? fenceMatch[1].trim() : trimmed;
            try {
                return JSON.parse(jsonStr);
            } catch (e) {
                return null;
            }
        }

        function parseQuestionResponseText(text) {
            if (!text) return null;

            const sseBlocks = text.split(/\r?\n\r?\n+/);
            for (const block of sseBlocks) {
                let eventType = '';
                const dataLines = [];
                block.split(/\r?\n/).forEach(line => {
                    if (line.startsWith('event:')) eventType = line.slice(6).trim();
                    else if (line.startsWith('data:')) dataLines.push(line.slice(5).trim());
                });
                const payload = dataLines.join('\n');
                if (eventType === 'widget_json' || payload.includes('"widget"')) {
                    const parsed = extractJsonFromPayload(payload);
                    if (parsed) return parsed;
                }
            }

            const lines = text.split(/\r?\n/);
            for (const line of lines) {
                if (!line.includes('widget_json')) continue;
                const tabParts = line.split('\t');
                for (let i = tabParts.length - 1; i >= 0; i--) {
                    const parsed = extractJsonFromPayload(tabParts[i]);
                    if (parsed) return parsed;
                }
            }

            const inlineMatch = text.match(/widget_json[\t\s]+([\s\S]+)/);
            if (inlineMatch) {
                const parsed = extractJsonFromPayload(inlineMatch[1]);
                if (parsed) return parsed;
            }

            try {
                const json = JSON.parse(text);
                if (json && (json.widget || json.data || json.blocks)) return json;
            } catch (e) { /* ignore */ }

            return extractJsonFromPayload(text);
        }

        async function readQuestionStream(response, timeoutMs = SSE_READ_TIMEOUT_MS) {
            const deadline = Date.now() + timeoutMs;

            if (!response.body) {
                return parseQuestionResponseText(await response.text());
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                if (Date.now() > deadline) {
                    throw new Error('读取 SSE 超时，未收到 widget_json');
                }

                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const parsed = parseQuestionResponseText(buffer);
                if (parsed) {
                    try { await reader.cancel(); } catch (e) { /* ignore */ }
                    return parsed;
                }
            }
            return parseQuestionResponseText(buffer);
        }

        async function readHttpErrorMessage(res) {
            let errMsg = `HTTP ${res.status}`;
            try {
                const errBody = await res.json();
                if (errBody && errBody.msg) errMsg += `：${errBody.msg}`;
                else if (errBody && errBody.message) errMsg += `：${errBody.message}`;
            } catch (e) {
                try {
                    const text = await res.text();
                    if (text) errMsg += `：${text.slice(0, 200)}`;
                } catch (e2) { /* ignore */ }
            }
            return errMsg;
        }

        async function fetchQuestionWidget() {
            const url = (questionApiUrl.value || '').trim();
            const userInput = (questionInput.value || '').trim();
            const placeIdRaw = (questionPlaceId.value || '').trim();
            const token = (questionToken.value || '').trim();
            const conversationId = (questionConvId.value || '').trim();
            const clientType = (questionClientType.value || '').trim() || 'wx_mini';

            if (!url) throw new Error('请填写 Question URL');
            if (!userInput) throw new Error('请填写 user_input');
            if (!placeIdRaw) throw new Error('请填写 place_id');
            if (!token) throw new Error('请填写 token（请求头必填）');

            const placeId = Number(placeIdRaw);
            if (!Number.isInteger(placeId) || placeId < 0 || placeId > 9999) {
                throw new Error('place_id 须为 0–9999 的整数');
            }

            questionFetchBtn.disabled = true;
            app.innerHTML = `<div class="loading-msg">请求中…<br><span style="font-size:12px;color:#c0c4cc;">${escapeHtml(url)}</span></div>`;

            try {
                const body = {
                    user_input: userInput,
                    place_id: placeId
                };
                if (conversationId) body.conversation_id = conversationId;

                const res = await fetchWithTimeout(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'text/event-stream, application/json',
                        'token': token,
                        'X-Client-Type': clientType
                    },
                    body: JSON.stringify(body)
                }, FETCH_TIMEOUT_MS);

                if (!res.ok) {
                    throw new Error(await readHttpErrorMessage(res));
                }

                const rawWidget = await readQuestionStream(res);
                if (!rawWidget) throw new Error('响应中未找到 widget_json 或有效 JSON');

                const data = normalizeWidgetData(rawWidget);
                if (!data || !Array.isArray(data.blocks)) {
                    throw new Error('解析结果无效，缺少 blocks');
                }

                previewContext.place_id = placeId;
                if (conversationId) previewContext.user_id = conversationId;

                try {
                    localStorage.setItem('question_token', token);
                } catch (e) { /* ignore */ }

                const jsonText = JSON.stringify(rawWidget, null, 2);
                setJsonEditorContent(jsonText, { focus: true });
            } finally {
                questionFetchBtn.disabled = false;
            }
        }

        function buildPopupUrl(popupId) {
            const placeId = previewContext.place_id || POPUP_API.place_id;
            const userId = previewContext.user_id || POPUP_API.user_id;
            return `${getPopupApiBase()}/${encodeURIComponent(popupId)}?place_id=${encodeURIComponent(placeId)}&user_id=${encodeURIComponent(userId)}`;
        }

        async function loadLocalPopupRaw(popupId) {
            const file = LOCAL_POPUP_FILES[popupId];
            if (!file) return null;
            const res = await fetchWithTimeout(file, {}, 5000);
            if (!res.ok) return null;
            return res.json();
        }

        async function handleOpenPopup(popupId) {
            const url = buildPopupUrl(popupId);
            app.innerHTML = `<div class="loading-msg">加载弹窗中…<br><span style="font-size:12px;color:#c0c4cc;">${escapeHtml(url)}</span></div>`;
            try {
                const res = await fetchWithTimeout(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const raw = await res.json();
                setJsonEditorContent(raw, { focus: true });
            } catch (e) {
                const localRaw = await loadLocalPopupRaw(popupId);
                if (localRaw) {
                    setJsonEditorContent(localRaw, { focus: true });
                    return;
                }
                app.innerHTML = `<div class="error-msg">弹窗请求失败<br><br>${escapeHtml(e.message)}<br><br><span style="font-size:12px;">${escapeHtml(url)}</span><br><br><span style="font-size:12px;color:#909399;">可改用 127.0.0.1 或检查终端用 curl.exe -m 5</span></div>`;
            }
        }

        function renderPreviewData(data) {
            const normalized = normalizeWidgetData(data);
            previewContext = {
                place_id: normalized.place_id || previewContext.place_id || POPUP_API.place_id,
                user_id: normalized.user_id || previewContext.user_id || POPUP_API.user_id
            };

            let html = '';
            const hasHeader = normalized.blocks && normalized.blocks.some(b => b.block === 'header');
            const widgetType = normalized.widget;

            if (widgetType && normalized.widget_id && !hasHeader) {
                html += `<div class="widget-title">${escapeHtml(normalized.widget_id)}</div>`;
            }

            if (normalized.blocks && Array.isArray(normalized.blocks)) {
                normalized.blocks.forEach(block => {
                    html += renderBlock(block);
                });
            }

            app.innerHTML = html || `<div class="loading-msg">弹窗数据为空</div>`;
        }

        function render() {
            clearTimeout(renderDebounceTimer);
            renderDebounceTimer = setTimeout(() => renderFromEditor(true), 200);
        }

        function closePopup() {
            app.innerHTML = `<div style="text-align:center;color:#999;padding:40px 20px;">弹框已关闭</div>`;
        }

        function handleJump(url) {
            if (!url || !/^https?:\/\//i.test(url)) {
                console.warn('[jump] invalid url:', url);
                return;
            }
            window.open(url, '_blank', 'noopener,noreferrer');
        }

        function handleDateTimeLocalChange(input) {
            if (!input || !input.classList.contains('item-datetime-local')) return;
            const bounds = {
                minDate: input.dataset.dtMinDate || '',
                maxDate: input.dataset.dtMaxDate || '',
                minTime: input.dataset.dtMinTime || '',
                maxTime: input.dataset.dtMaxTime || ''
            };
            const clamped = clampDateTimeLocalValue(input.value, bounds);
            if (clamped && clamped !== input.value) {
                input.value = clamped;
            }
        }

        function handleAppClick(e) {
            if (e.target.closest('[data-action="close"]')) {
                closePopup();
                return;
            }

            const jumpBtn = e.target.closest('[data-action-type="jump"]');
            if (jumpBtn && jumpBtn.dataset.actionUrl) {
                handleJump(jumpBtn.dataset.actionUrl);
                return;
            }

            const popupBtn = e.target.closest('[data-action-type="open_popup"]');
            if (popupBtn && popupBtn.dataset.popupId) {
                handleOpenPopup(popupBtn.dataset.popupId);
                return;
            }

            const msgBtn = e.target.closest('[data-action-type="send_msg"]');
            if (msgBtn) {
                const detail = {
                    msg: msgBtn.dataset.actionMsg || '',
                    template: msgBtn.dataset.actionTemplate || '',
                    scope: msgBtn.dataset.actionScope || '',
                    payload: msgBtn.dataset.actionPayload || ''
                };
                console.log('[send_msg]', detail);
                return;
            }

            const callBtn = e.target.closest('[data-action-type="call"]');
            if (callBtn && callBtn.dataset.actionTel) {
                console.log('[call]', callBtn.dataset.actionTel);
                return;
            }

            const navBtn = e.target.closest('[data-action-type="nav"]');
            if (navBtn && navBtn.dataset.actionNav) {
                try {
                    console.log('[nav]', JSON.parse(navBtn.dataset.actionNav));
                } catch (err) {
                    console.log('[nav]', navBtn.dataset.actionNav);
                }
                return;
            }
        }

        app.addEventListener('click', handleAppClick);
        app.addEventListener('change', e => handleDateTimeLocalChange(e.target));
        app.addEventListener('input', e => {
            if (e.target && e.target.classList.contains('item-datetime-local')) {
                handleDateTimeLocalChange(e.target);
            }
        });
        input.addEventListener('input', render);
        questionFetchBtn.addEventListener('click', () => {
            fetchQuestionWidget().catch(e => {
                app.innerHTML = `<div class="error-msg">Question 请求失败<br><br>${escapeHtml(e.message)}</div>`;
                questionFetchBtn.disabled = false;
            });
        });
        questionInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') questionFetchBtn.click();
        });
        try {
            const savedToken = localStorage.getItem('question_token');
            if (savedToken && questionToken) questionToken.value = savedToken;
        } catch (e) { /* ignore */ }
        renderFromEditor(true);
    </script>
</body>
